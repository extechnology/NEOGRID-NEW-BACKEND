---
deployment:
  tasks:
    # 1. Define your deployment path (where your Django app lives on cPanel)
    - export DEPLOYPATH=/home/czdjuaxk/server.neogrid.in/
    
    # 2. Copy the files from the git repository to the deployment path
    - /bin/cp -R * $DEPLOYPATH
    
    # 3. (Optional but recommended) Run Django specific commands like migrations and collectstatic
    # Note: You need to specify the path to your Python virtual environment's activation script. 
    # Update '3.12' below to whatever Python version you selected in cPanel (e.g. 3.9, 3.10)
    # Example:
    # - source /home/czdjuaxk/virtualenv/server.neogrid.in/3.12/bin/activate && cd $DEPLOYPATH && pip install -r requirements.txt
    # - source /home/czdjuaxk/virtualenv/server.neogrid.in/3.12/bin/activate && cd $DEPLOYPATH && python manage.py migrate
    # - source /home/czdjuaxk/virtualenv/server.neogrid.in/3.12/bin/activate && cd $DEPLOYPATH && python manage.py collectstatic --noinput
    
    # 4. Restart the Passenger app (if using Phusion Passenger on cPanel for Python apps)
    - touch $DEPLOYPATH/tmp/restart.txt
